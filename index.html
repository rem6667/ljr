<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <!-- 完整移动端适配标签 -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ljr是笨蛋</title>
  <style>
    /* 全局重置 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #111;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* 窗口容器：自适应宽度 修复缺失px数值 */
    .win-box {
      width: min(300px, 80vw);
      height: min(100px, 25vh);
      background: rgba(30,30,40,0.85);
      border: 1px solid #ff6699;
      border-radius: 8px;
      position: fixed;
      box-shadow: 0 0 20px #ff447755;
      overflow: hidden;
    }

    /* 窗口标题栏 修复高度缺失 */
    .win-title {
      height: 36px;
      background: #ff4477;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      cursor: move;
    }
    .win-title-text {
      color: #fff;
      font-size: clamp(10px, 2vw, 14px);
    }
    .win-close {
      width: 22px;
      height: 22px;
      line-height: 22px;
      text-align: center;
      color: white;
      background: #ff2255;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .win-close:hover {
      background: #ff0033;
    }

    /* 窗口内容区域 */
    .win-content {
      width: 100%;
      height: calc(100% - 36px);
      overflow: hidden;
      position: relative;
    }
  </style>
</head>
<body>

<script>

"好运永远不中断",
"温柔和温暖常伴身旁",
"未来道路耀眼夺目",
"钱财一直进钱包",
"每天无忧无虑过日子",
"欢喜时时刻刻存在",
"所有事情完美收尾",
"好运长久不离开",
"平安开心常伴左右",
"有钱赚还有人偏爱",

];

// 随机柔和配色
function getRandomColor() {
  const colorList = [
    '#ff6699','#ff5555','#ffbb66','#88ddff','#bb88ff','#77eeaa','#ffdd77','#ff88bb','#66ccff','#ff7777'
  ];
  return colorList[Math.floor(Math.random() * colorList.length)];
}

// 随机祝福
function getRandomBless() {
    return blessList[Math.floor(Math.random() * blessList.length)];
}

// 爱心参数方程
function getHeartPoint(t) {
  const x = 16 * Math.pow(Math.sin(t), 3);
  const y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
  return { x, y };
}

// 创建窗口公共函数
function createNewWindow() {
  if(isHeartStage && winCount >= maxHeartWin){
    clearInterval(timer);
    document.querySelectorAll('.win-box').forEach(item=>item.remove());
    winCount = 0;
    isHeartStage = false;
    setTimeout(()=>{
      timer = setInterval(createNewWindow,50);
    },500)
    return;
  }

  const w = window.innerWidth;
  const h = window.innerHeight;
  const winW = Math.min(300, w * 0.8);
  const winH = Math.min(100, h * 0.25);
  let randomLeft, randomTop;

  if(isHeartStage){
    // 分设备缩小爱心，电脑、手机都完整容纳
    let heartScale;
    if(w < 768){
      // 手机更小爱心
      heartScale = w / 63;
    }else{
      // 电脑缩小爱心，不会溢出屏幕
      heartScale = w / 60;
    }
    // 垂直居中微调，防止上下跑出屏幕
    const centerX = w / 2;
    const centerY = h / 2 - h * 0.02;
    const t = (winCount / maxHeartWin) * Math.PI * 2;
    const point = getHeartPoint(t);
    randomLeft = centerX + point.x * heartScale;
    randomTop = centerY - point.y * heartScale;
  }else{
    // ========== 修改核心：取消所有安全边距，全屏随机，允许窗口一半跑出屏幕 ==========
    const safeLeft = Math.random() * w - winW * 0.5;
    const safeTop = Math.random() * h - winH * 0.5;
    randomLeft = safeLeft;
    randomTop = safeTop;
  }

  const mainColor = getRandomColor();
  const blessText = getRandomBless();

  const win = document.createElement('div');
  win.className = 'win-box';
  win.style.left = randomLeft + 'px';
  win.style.top = randomTop + 'px';
  win.style.borderColor = mainColor;
  win.style.boxShadow = `0 0 20px ${mainColor}55`;

  win.innerHTML = `
    <div class="win-title" style="background:${mainColor}">
      <span class="win-title-text">ljr是笨蛋</span>
      <button class="win-close">×</button>
    </div>
    <div class="win-content" style="color:${mainColor};display:flex;align-items:center;justify-content:center;font-size:clamp(11px,2.2vw,16px);font-weight:bold;text-align:center;padding:4px;">
      ${blessText}
    </div>
  `;

  const dragBar = win.querySelector('.win-title');
  const closeBtn = win.querySelector('.win-close');

  // 关闭窗口
  closeBtn.onclick = function () {
    win.remove();
    winCount--;
  }

  // 拖拽逻辑（兼容手机触摸+电脑鼠标）
  let isDrag = false;
  let offsetX, offsetY;
  function startDrag(e) {
    isDrag = true;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    offsetX = clientX - win.offsetLeft;
    offsetY = clientY - win.offsetTop;
    e.preventDefault();
  }
  function moveDrag(e) {
    if (!isDrag) return;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    win.style.left = (clientX - offsetX) + 'px';
    win.style.top = (clientY - offsetY) + 'px';
  }
  function endDrag() {
    isDrag = false;
  }
  dragBar.addEventListener('mousedown', startDrag)
  dragBar.addEventListener('touchstart', startDrag)
  document.addEventListener('mousemove', moveDrag)
  document.addEventListener('touchmove', moveDrag)
  document.addEventListener('mouseup', endDrag)
  document.addEventListener('touchend', endDrag)

  document.body.appendChild(win);
  winCount++;
}

timer = setInterval(createNewWindow, 50);
</script>

</body>
</html>
